name: Supertrend Screener

on:
  schedule:
    - cron: "30 14 * * 1-5"   # 9:30 AM ET Mon–Fri (market open)
  workflow_dispatch:            # manual trigger from Actions tab

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            alpaca-trade-api \
            yfinance \
            pandas \
            numpy \
            requests \
            gspread \
            google-auth \
            lxml \
            html5lib

      - name: Run screener
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
          GSPREAD_SA_KEY_JSON: ${{ secrets.GSPREAD_SA_KEY_JSON }}
        run: python supertrend_screener.py --max-orders 5
